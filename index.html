<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Shelf — Fragrance Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:        #1a1612;
      --smoke:      #2e2820;
      --amber:      #c8813a;
      --amber-dim:  #8a5520;
      --gold:       #d4a94a;
      --parchment:  #f5f0e8;
      --vellum:     #ede7d9;
      --mist:       #a09585;
      --glass:      rgba(255,255,255,0.06);
      --border:     rgba(200,129,58,0.18);

      --ff-display: 'Cormorant Garamond', Georgia, serif;
      --ff-body:    'DM Sans', system-ui, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--ink);
      color: var(--parchment);
      font-family: var(--ff-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 28px 40px 22px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 20px;
      position: sticky;
      top: 0;
      background: var(--ink);
      z-index: 100;
    }

    .brand h1 {
      font-family: var(--ff-display);
      font-weight: 300;
      font-size: 2rem;
      letter-spacing: 0.04em;
      color: var(--parchment);
      line-height: 1;
    }

    .brand span {
      font-family: var(--ff-body);
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      display: block;
      margin-top: 4px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #search {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--parchment);
      font-family: var(--ff-body);
      font-size: 13px;
      padding: 8px 14px;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    #search::placeholder { color: var(--mist); }
    #search:focus { border-color: var(--amber); }

    .btn-add {
      background: var(--amber);
      border: none;
      border-radius: 4px;
      color: var(--ink);
      cursor: pointer;
      font-family: var(--ff-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 18px;
      transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-add:hover { background: var(--gold); }

    .btn-export {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--mist);
      cursor: pointer;
      font-family: var(--ff-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 18px;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-export:hover {
      border-color: var(--amber);
      color: var(--amber);
    }

    /* ── FILTERS ── */
    .filters {
      padding: 16px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mist);
      margin-right: 4px;
    }

    .chip {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--mist);
      cursor: pointer;
      font-family: var(--ff-body);
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.06em;
      padding: 4px 12px;
      transition: all 0.18s;
    }
    .chip:hover, .chip.active {
      background: var(--amber);
      border-color: var(--amber);
      color: var(--ink);
      font-weight: 500;
    }

    /* ── STATS BAR ── */
    .stats {
      padding: 12px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 32px;
    }
    .stat {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .stat-num {
      font-family: var(--ff-display);
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--amber);
      line-height: 1;
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--mist);
    }

    /* ── GRID ── */
    .grid-wrap {
      padding: 32px 40px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 2px;
    }

    /* ── CARD ── */
    .card {
      background: var(--smoke);
      border: 1px solid transparent;
      cursor: pointer;
      padding: 22px 20px 18px;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 100%;
      background: var(--amber);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.22s ease;
    }

    .card:hover {
      background: #332d24;
      border-color: var(--border);
    }
    .card:hover::before { transform: scaleY(1); }

    .card-house {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 5px;
    }

    .card-name {
      font-family: var(--ff-display);
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--parchment);
      line-height: 1.25;
      margin-bottom: 10px;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-bottom: 12px;
    }

    .tag {
      border-radius: 2px;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.12em;
      padding: 2px 7px;
      text-transform: uppercase;
    }

    .tag-family  { background: rgba(200,129,58,0.15); color: var(--amber); border: 1px solid rgba(200,129,58,0.3); }
    .tag-season  { background: rgba(164,150,125,0.12); color: var(--mist); border: 1px solid rgba(164,150,125,0.25); }
    .tag-occasion{ background: rgba(212,169,74,0.1); color: var(--gold); border: 1px solid rgba(212,169,74,0.2); }

    .card-notes {
      font-size: 11px;
      color: var(--mist);
      font-style: italic;
      line-height: 1.4;
    }

    .card-type-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 8px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--smoke);
      padding: 2px 7px;
      border-radius: 2px;
    }
    .badge-designer { background: var(--gold); }
    .badge-niche    { background: var(--amber); }
    .badge-clone    { background: var(--mist); }
    .badge-middle-eastern { background: #b07d4a; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15,11,8,0.88);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--smoke);
      border: 1px solid var(--border);
      border-radius: 4px;
      max-width: 820px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      position: relative;
    }

    .modal-header {
      border-bottom: 1px solid var(--border);
      padding: 28px 32px 22px;
      position: sticky;
      top: 0;
      background: var(--smoke);
    }

    .modal-house {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 4px;
    }

    .modal-name {
      font-family: var(--ff-display);
      font-size: 2.2rem;
      font-weight: 300;
      color: var(--parchment);
      line-height: 1.1;
    }

    .modal-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: var(--mist);
      cursor: pointer;
      font-size: 20px;
      line-height: 1;
      padding: 4px 8px;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--parchment); }

    .modal-body {
      padding: 24px 32px 32px;
    }

    .modal-section-title {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 14px;
      margin-top: 24px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }
    .modal-section-title:first-child { margin-top: 0; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px 20px;
      margin-bottom: 4px;
    }

    .detail-row { display: flex; flex-direction: column; gap: 2px; }
    .detail-key {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mist);
    }
    .detail-val {
      font-size: 13px;
      color: var(--parchment);
    }

    .pairing-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pairing-item {
      background: var(--glass);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 12px 14px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    .pairing-item:hover {
      border-color: var(--amber);
      background: rgba(200,129,58,0.07);
    }

    .pairing-item-name {
      font-family: var(--ff-display);
      font-size: 1.05rem;
      color: var(--parchment);
      margin-bottom: 2px;
    }
    .pairing-item-why {
      font-size: 11px;
      color: var(--mist);
      font-style: italic;
    }
    .pairing-not-owned {
      font-size: 9px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amber-dim);
      margin-top: 3px;
    }

    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    /* ── ADD FORM MODAL ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .form-group.full { grid-column: 1 / -1; }

    .form-group label {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--mist);
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      background: var(--ink);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--parchment);
      font-family: var(--ff-body);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: var(--amber); }
    .form-group select option { background: var(--smoke); }
    .form-group textarea { resize: vertical; min-height: 70px; }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 22px;
      padding-top: 18px;
      border-top: 1px solid var(--border);
    }

    .btn-cancel {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--mist);
      cursor: pointer;
      font-family: var(--ff-body);
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 18px;
      transition: all 0.2s;
    }
    .btn-cancel:hover { border-color: var(--mist); color: var(--parchment); }

    .empty-state {
      padding: 80px 40px;
      text-align: center;
    }
    .empty-state p {
      font-family: var(--ff-display);
      font-size: 1.5rem;
      font-weight: 300;
      color: var(--mist);
      font-style: italic;
    }

    /* ── DELETE BTN ── */
    .btn-delete {
      position: absolute;
      bottom: 14px;
      right: 14px;
      background: none;
      border: none;
      color: transparent;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
      transition: color 0.2s;
    }
    .card:hover .btn-delete { color: rgba(200,129,58,0.4); }
    .btn-delete:hover { color: #c0392b !important; }

    /* ── SPRAY MAP ── */
    .spray-layout {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 24px;
      align-items: start;
    }

    .spray-figure {
      position: relative;
      width: 200px;
      flex-shrink: 0;
    }

    .spray-figure svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* hotspot dot on the figure */
    .spray-dot {
      position: absolute;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      cursor: default;
      transition: transform 0.2s, box-shadow 0.2s;
      border: 2px solid var(--ink);
    }

    .spray-dot.active {
      animation: pulse 2s ease-in-out infinite;
    }

    .spray-dot.inactive {
      background: rgba(160,149,133,0.2) !important;
      border-color: rgba(160,149,133,0.3) !important;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(200,129,58,0.5); }
      50%       { box-shadow: 0 0 0 6px rgba(200,129,58,0); }
    }

    .spray-legend {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .spray-zone {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 12px;
      border-radius: 3px;
      border: 1px solid transparent;
      transition: border-color 0.2s, background 0.2s;
    }

    .spray-zone.active {
      background: rgba(200,129,58,0.07);
      border-color: var(--border);
    }

    .spray-zone.inactive {
      opacity: 0.38;
    }

    .spray-zone-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px;
    }

    .spray-zone-info {}

    .spray-zone-name {
      font-size: 12px;
      font-weight: 500;
      color: var(--parchment);
      margin-bottom: 1px;
    }

    .spray-zone-tip {
      font-size: 11px;
      color: var(--mist);
      font-style: italic;
      line-height: 1.4;
    }

    .spray-zone-sprays {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .spray-note {
      margin-top: 14px;
      padding: 10px 12px;
      background: rgba(212,169,74,0.07);
      border: 1px solid rgba(212,169,74,0.2);
      border-radius: 3px;
      font-size: 11px;
      color: var(--gold);
      font-style: italic;
      line-height: 1.5;
    }

    /* ── RESPONSIVE ── */

    /* Tablet */
    @media (max-width: 768px) {
      header { padding: 16px 20px; }
      .filters, .stats, .grid-wrap { padding-left: 20px; padding-right: 20px; }
      .modal { max-width: 100%; border-radius: 0; }
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal { max-height: 92vh; border-radius: 12px 12px 0 0; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
    }

    /* Mobile */
    @media (max-width: 600px) {

      /* Header — stack brand above search+actions */
      header {
        padding: 14px 16px 12px;
        flex-direction: column;
        align-items: stretch;
        gap: 10px;
      }

      .brand h1 { font-size: 1.6rem; }

      .header-actions {
        display: grid;
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        align-items: center;
      }

      #search {
        width: 100%;
        font-size: 16px; /* Prevent iOS zoom on focus */
      }

      .btn-export {
        padding: 9px 10px;
        font-size: 11px;
      }
      .btn-export::before { content: '↓ '; }

      .btn-add {
        padding: 9px 10px;
        font-size: 18px;
        font-weight: 300;
        letter-spacing: 0;
      }
      .btn-add::after { content: ''; }
      /* Show + icon only on mobile */
      .btn-add { font-size: 0; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; }
      .btn-add::after { content: '+'; font-size: 22px; font-weight: 300; line-height: 1; }

      /* Filters — horizontal scroll, no wrap */
      .filters {
        padding: 10px 16px;
        gap: 6px;
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .filters::-webkit-scrollbar { display: none; }
      .filter-label { display: none; }
      .chip { white-space: nowrap; flex-shrink: 0; }

      /* Stats — compact */
      .stats {
        padding: 10px 16px;
        gap: 16px;
      }
      .stat-num { font-size: 1.2rem; }
      .stat-label { font-size: 9px; }

      /* Grid — single column on mobile */
      .grid-wrap { padding: 16px; }
      .grid { grid-template-columns: 1fr; gap: 2px; }

      /* Card — tighter */
      .card { padding: 16px 16px 14px; }
      .card-name { font-size: 1.1rem; }

      /* Modal — full-screen bottom sheet */
      .modal-overlay {
        padding: 0;
        align-items: flex-end;
      }
      .modal {
        max-width: 100%;
        width: 100%;
        max-height: 94vh;
        border-radius: 16px 16px 0 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
      }

      .modal-header {
        padding: 20px 20px 16px;
        /* Drag handle visual */
        padding-top: 28px;
      }
      .modal-header::before {
        content: '';
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 36px;
        height: 4px;
        background: rgba(200,129,58,0.3);
        border-radius: 2px;
      }
      .modal-name { font-size: 1.7rem; }
      .modal-close {
        top: 16px;
        right: 16px;
      }

      .modal-body { padding: 16px 20px 40px; }

      /* Detail grid — single col */
      .detail-grid { grid-template-columns: 1fr 1fr; gap: 10px 12px; }

      /* Spray map — stacked, figure on top centred */
      .spray-layout {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      .spray-figure {
        width: 120px;
        margin: 0 auto;
      }

      /* Form — single col */
      .form-grid { grid-template-columns: 1fr; gap: 12px; }
      .form-group.full { grid-column: 1; }

      .form-group input,
      .form-group select,
      .form-group textarea {
        font-size: 16px; /* Prevent iOS zoom */
      }

      .form-actions {
        flex-direction: column-reverse;
        gap: 8px;
      }
      .form-actions .btn-add,
      .form-actions .btn-cancel {
        width: 100%;
        text-align: center;
        padding: 12px;
      }

      /* Pairing items — full width tap targets */
      .pairing-item { padding: 12px; }

      /* Spray zones — slightly more compact */
      .spray-zone { padding: 8px 10px; gap: 10px; }
      .spray-zone-tip { font-size: 10px; }
    }

    /* Touch devices — always show delete, remove hover-only states */
    @media (hover: none) {
      .btn-delete {
        color: rgba(200,129,58,0.25);
      }
      .card:active {
        background: #332d24;
      }
    }

    /* Very small phones */
    @media (max-width: 380px) {
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="brand">
    <h1>The Shelf</h1>
    <span>Fragrance Collection</span>
  </div>
  <div class="header-actions">
    <input type="text" id="search" placeholder="Search fragrances…" oninput="renderGrid()" />
    <button class="btn-export" onclick="exportForFriend()">↓ Share</button>
    <button class="btn-add" onclick="openAddModal()">+ Add Fragrance</button>
  </div>
</header>

<div class="filters">
  <span class="filter-label">Filter</span>
  <button class="chip active" data-filter="all" onclick="setFilter('all',this)">All</button>
  <button class="chip" data-filter="designer" onclick="setFilter('designer',this)">Designer</button>
  <button class="chip" data-filter="middle-eastern" onclick="setFilter('middle-eastern',this)">Middle Eastern</button>
  <button class="chip" data-filter="clone" onclick="setFilter('clone',this)">Clones</button>
  <button class="chip" data-filter="niche" onclick="setFilter('niche',this)">Niche</button>
  <button class="chip" data-filter="summer" onclick="setFilter('summer',this)">Summer</button>
  <button class="chip" data-filter="winter" onclick="setFilter('winter',this)">Winter</button>
  <button class="chip" data-filter="date" onclick="setFilter('date',this)">Date Night</button>
  <button class="chip" data-filter="office" onclick="setFilter('office',this)">Office</button>
</div>

<div class="stats">
  <div class="stat"><span class="stat-num" id="stat-total">0</span><span class="stat-label">Fragrances</span></div>
  <div class="stat"><span class="stat-num" id="stat-houses">0</span><span class="stat-label">Houses</span></div>
  <div class="stat"><span class="stat-num" id="stat-designer">0</span><span class="stat-label">Designer</span></div>

  // ── OTHER
  { id:'jli',     house:'Alhambra',     name:'Jean Lowe Immortal',  type:'middle-eastern', family:'Woody / Aromatic',   season:'All Year',          occasion:'Versatile',          notes:'aquatic, woods, musk, amber',         tags:['versatile','casual'] },
  { id:'aodmw',   house:'Oud Wood',     name:'Oud Wood (Clone box)',type:'clone',           family:'Woody / Aromatic',   season:'Autumn / Winter',   occasion:'Office',             notes:'oud, sandalwood, woods',              tags:['woody','office'] },
  { id:'khalis',  house:'Khalis',       name:'Khalis (mini)',        type:'middle-eastern', family:'Oriental / Oud',     season:'Autumn / Winter',   occasion:'Evening',            notes:'oud, amber, musk',                    tags:['evening','oud','mini'] },
];

// ── STATE ────────────────────────────────────────────────────────────────
let collection = [];
let activeFilter = 'all';
let currentFragrance = null;

function loadCollection() {
  const stored = localStorage.getItem('theShelf');
  collection = stored ? JSON.parse(stored) : DEFAULT_COLLECTION.map(f => ({...f}));
  saveCollection();
}

function saveCollection() {
  localStorage.setItem('theShelf', JSON.stringify(collection));
}

// ── FILTER ───────────────────────────────────────────────────────────────
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}

// ── RENDER GRID ──────────────────────────────────────────────────────────
function renderGrid() {
  const query = document.getElementById('search').value.toLowerCase().trim();
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');

  let filtered = collection.filter(f => {
    const matchFilter =
      activeFilter === 'all' ||
      activeFilter === f.type ||
      (activeFilter === 'summer'  && (f.tags||[]).some(t => ['summer','holiday','spring'].includes(t))) ||
      (activeFilter === 'winter'  && (f.tags||[]).some(t => ['winter','autumn'].includes(t))) ||
      (activeFilter === 'date'    && (f.tags||[]).some(t => ['date','evening'].includes(t))) ||
      (activeFilter === 'office'  && (f.tags||[]).some(t => ['office'].includes(t)));
    const matchSearch =
      !query ||
      f.name.toLowerCase().includes(query) ||
      f.house.toLowerCase().includes(query) ||
      (f.notes||'').toLowerCase().includes(query) ||
      (f.tags||[]).some(t => t.includes(query));
    return matchFilter && matchSearch;
  });

  updateStats();

  if (!filtered.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(f => cardHTML(f)).join('');
}

function cardHTML(f) {
  const typeBadge = {
    designer:       ['badge-designer', 'Designer'],
    'middle-eastern':['badge-middle-eastern', 'M. Eastern'],
    clone:          ['badge-clone', 'Clone'],
    niche:          ['badge-niche', 'Niche'],
  }[f.type] || ['badge-clone', f.type];

  const tagHtml = [
    f.family   ? `<span class="tag tag-family">${f.family}</span>` : '',
    f.season   ? `<span class="tag tag-season">${f.season}</span>` : '',
    f.occasion ? `<span class="tag tag-occasion">${f.occasion}</span>` : '',
  ].join('');

  return `
    <div class="card" onclick="openDetail('${f.id}')">
      <span class="card-type-badge ${typeBadge[0]}">${typeBadge[1]}</span>
      <div class="card-house">${escHtml(f.house)}</div>
      <div class="card-name">${escHtml(f.name)}</div>
      <div class="card-tags">${tagHtml}</div>
      <div class="card-notes">${escHtml(f.notes||'')}</div>
      <button class="btn-delete" onclick="deleteFragrance(event,'${f.id}')" title="Remove">✕</button>
    </div>`;
}

// ── STATS ────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('stat-total').textContent    = collection.length;
  document.getElementById('stat-houses').textContent   = new Set(collection.map(f=>f.house)).size;
  document.getElementById('stat-designer').textContent = collection.filter(f=>f.type==='designer').length;
  document.getElementById('stat-clone').textContent    = collection.filter(f=>f.type==='clone').length;
}

// ── DETAIL MODAL ─────────────────────────────────────────────────────────
function openDetail(id) {
  const f = collection.find(x => x.id === id);
  if (!f) return;
  currentFragrance = f;

  document.getElementById('d-house').textContent    = f.house;
  document.getElementById('d-name').textContent     = f.name;
  document.getElementById('d-family').textContent   = f.family   || '—';
  document.getElementById('d-type').textContent     = capitalise(f.type);
  document.getElementById('d-season').textContent   = f.season   || '—';
  document.getElementById('d-occasion').textContent = f.occasion || '—';
  document.getElementById('d-notes').textContent    = f.notes    || '—';

  // Tags
  const tagsEl = document.getElementById('d-tags');
  tagsEl.innerHTML = (f.tags||[]).map(t =>
    `<span class="tag tag-family">${escHtml(t)}</span>`
  ).join('');

  // Pairings
  const pairingsEl = document.getElementById('d-pairings');
  const pairs = getPairings(f);
  if (!pairs.length) {
    pairingsEl.innerHTML = '<p style="color:var(--mist);font-style:italic;font-size:13px">No specific pairing data yet.</p>';
  } else {
    pairingsEl.innerHTML = pairs.map(p => `
      <div class="pairing-item" onclick="openDetail('${p.id}')">
        <div class="pairing-item-name">${escHtml(p.house)} — ${escHtml(p.name)}</div>
        <div class="pairing-item-why">${escHtml(p.reason)}</div>
        ${!p.owned ? '<div class="pairing-not-owned">Not in collection</div>' : ''}
      </div>
    `).join('');
  }

  document.getElementById('detailOverlay').classList.add('open');
  buildSprayMap(f);
}

function getPairings(f) {
  const results = [];
  const seen = new Set();

  // 1. Rule-based: same or compatible families
  PAIRING_RULES.forEach(rule => {
    if (rule.families.includes(f.family)) {
      const otherFamily = rule.families.find(x => x !== f.family) || f.family;
      collection.forEach(other => {
        if (other.id === f.id) return;
        if (seen.has(other.id)) return;
        if (other.family === otherFamily || other.family === f.family) {
          seen.add(other.id);
          results.push({ ...other, reason: rule.reason, owned: true });
        }
      });
    }
  });

  // 2. Same house — often designed to complement
  collection.forEach(other => {
    if (other.id === f.id || seen.has(other.id)) return;
    if (other.house === f.house) {
      seen.add(other.id);
      results.push({ ...other, reason: `Same house — ${other.house} fragrances are designed with a shared aesthetic.`, owned: true });
    }
  });

  // 3. Layering tips specific to well-known combos
  const SPECIFIC = {
    'tf-np':  [{name:'Oud Wood', why:'Neroli over Oud Wood — citrus top on a woody base is a classic TF layering technique.'}],
    'tf-ow':  [{name:'Neroli Portofino', why:'A drop of Neroli lifts the Oud Wood and adds a coastal freshness.'}],
    'bdc':    [{name:'Sauvage Dior (Clone)', why:'Both share ambroxan / woody DNA — layering deepens projection.'}],
    '9pm':    [{name:'Khamrah', why:'Both are dark, spicy and sweet — layering doubles the sillage and complexity.'}],
    'kham':   [{name:'Asad Bourbon', why:'Bourbon and oud-vanilla is a potent, rich combination for cold evenings.'}],
    'tev-br': [{name:'9PM', why:'BR540 amber base over 9PM spice creates an opulent, club-ready blend.'}],
    'absg':   [{name:'Asad Bourbon', why:'Leather and bourbon create a spiced, aged-whisky effect.'}],
  };

  if (SPECIFIC[f.id]) {
    SPECIFIC[f.id].forEach(hint => {
      const match = collection.find(x => x.name === hint.name);
      if (match && !seen.has(match.id)) {
        seen.add(match.id);
        results.push({ ...match, reason: hint.why, owned: true });
      }
    });
  }

  return results.slice(0, 8);
}

// ── ADD FRAGRANCE ────────────────────────────────────────────────────────
function openAddModal() {
  ['f-house','f-name','f-notes','f-tags'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('addOverlay').classList.add('open');
}

function addFragrance() {
  const house    = document.getElementById('f-house').value.trim();
  const name     = document.getElementById('f-name').value.trim();
  const type     = document.getElementById('f-type').value;
  const family   = document.getElementById('f-family').value;
  const season   = document.getElementById('f-season').value;
  const occasion = document.getElementById('f-occasion').value;
  const notes    = document.getElementById('f-notes').value.trim();
  const tags     = document.getElementById('f-tags').value.split(',').map(t=>t.trim().toLowerCase()).filter(Boolean);

  if (!house || !name) {
    alert('House and Fragrance Name are required.');
    return;
  }

  const id = 'user-' + Date.now();
  collection.push({ id, house, name, type, family, season, occasion, notes, tags });
  saveCollection();
  closeModal('addOverlay');
  renderGrid();
}

// ── DELETE ───────────────────────────────────────────────────────────────
function deleteFragrance(e, id) {
  e.stopPropagation();
  if (!confirm('Remove this fragrance from your collection?')) return;
  collection = collection.filter(f => f.id !== id);
  saveCollection();
  renderGrid();
}

// ── MODAL HELPERS ────────────────────────────────────────────────────────
function closeModal(overlayId) {
  document.getElementById(overlayId).classList.remove('open');
}

function handleOverlayClick(e, overlayId) {
  if (e.target.id === overlayId) closeModal(overlayId);
}

// ── UTILS ────────────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function capitalise(s) {
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : '';
}

// ── KEYBOARD ─────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeModal('detailOverlay');
    closeModal('addOverlay');
  }
});

// ── SPRAY MAP ENGINE ─────────────────────────────────────────────────────
// Each zone: id, label, tip, position on figure (% from top-left of SVG container),
// dot color tier (primary / secondary / optional), sprays count

function buildSprayMap(f) {
  const profile = FAMILY_PROFILES[f.family] || FAMILY_PROFILES['Woody / Aromatic'];
  const figureEl = document.getElementById('d-spray-figure');
  const legendEl = document.getElementById('d-spray-legend');
  const noteEl   = document.getElementById('d-spray-note');

  // Inject SVG
  figureEl.innerHTML = BODY_SVG;

  // Determine active zone set
  const primarySet   = new Set(profile.primary);
  const secondarySet = new Set(profile.secondary);
  const optionalSet  = new Set(profile.optional || []);

  // Occasion modifier: if date/evening, boost neck-back and chest
  const isDateEvening = ['Date Night','Formal / Evening'].includes(f.occasion);
  const isOffice      = f.occasion === 'Office';
  const isSport       = f.occasion === 'Sport / Active';
  const isSummer      = ['Summer','Spring / Summer','Summer / Holiday'].includes(f.season);

  // Place dots on figure
  ZONES.forEach(zone => {
    let tier = null;
    if (primarySet.has(zone.id))   tier = 'primary';
    if (secondarySet.has(zone.id)) tier = 'secondary';
    if (optionalSet.has(zone.id))  tier = 'optional';

    // Occasion adjustments
    if (isDateEvening && zone.id === 'neck-back' && !tier) tier = 'secondary';
    if (isOffice && zone.id === 'clothes-chest' && tier !== 'primary') tier = 'secondary';
    if (isSport && ['clothes-chest','wrist-right','forearm-r'].includes(zone.id)) tier = null;
    if (isSummer && zone.id === 'clothes-chest' && tier === 'primary') tier = 'secondary';

    const dot = document.createElement('div');
    dot.className = 'spray-dot ' + (tier ? 'active' : 'inactive');
    const size = tier === 'primary' ? 14 : tier === 'secondary' ? 11 : tier === 'optional' ? 9 : 8;
    dot.style.cssText = `
      left: ${zone.x}%;
      top:  ${zone.y}%;
      width:  ${size}px;
      height: ${size}px;
      background: ${tier ? DOT_COLORS[tier] : 'rgba(90,78,64,0.4)'};
      border-color: ${tier ? 'var(--ink)' : 'rgba(90,78,64,0.5)'};
    `;
    figureEl.appendChild(dot);
  });

  // Build legend
  const allActive = [
    ...profile.primary.map(id => ({ id, tier:'primary' })),
    ...profile.secondary.map(id => ({ id, tier:'secondary' })),
    ...(profile.optional||[]).map(id => ({ id, tier:'optional' })),
  ];

  // Apply occasion adjustments to legend too
  const legendZones = allActive.filter(a => {
    if (isSport && ['clothes-chest','wrist-right','forearm-r'].includes(a.id)) return false;
    return true;
  });
  if (isDateEvening) {
    const hasNeckBack = legendZones.find(a => a.id === 'neck-back');
    if (!hasNeckBack) legendZones.push({ id:'neck-back', tier:'secondary' });
  }
  if (isOffice) {
    const hasClothes = legendZones.find(a => a.id === 'clothes-chest');
    if (!hasClothes) legendZones.push({ id:'clothes-chest', tier:'secondary' });
  }

  legendEl.innerHTML = legendZones.map(a => {
    const zone = ZONES.find(z => z.id === a.id);
    if (!zone) return '';
    const color = DOT_COLORS[a.tier];
    const tierLabel = a.tier === 'primary' ? 'Essential' : a.tier === 'secondary' ? 'Recommended' : 'Optional';
    return `
      <div class="spray-zone active">
        <div class="spray-zone-dot" style="background:${color}"></div>
        <div class="spray-zone-info">
          <div class="spray-zone-name">${zone.label}</div>
          <div class="spray-zone-tip">${zone.tip}</div>
          <div class="spray-zone-sprays" style="color:${color}">${tierLabel} · ${zone.sprays} spray</div>
        </div>
      </div>`;
  }).join('');

  // Total sprays callout
  let sprayCount = profile.totalSprays;
  if (isDateEvening) sprayCount = Math.min(sprayCount + 1, 5);
  if (isSport) sprayCount = Math.max(sprayCount - 1, 2);

  noteEl.textContent = `💡 ${profile.note} Total recommended: ${sprayCount}–${sprayCount + 1} sprays.`;
}

// ── EXPORT FOR FRIEND ────────────────────────────────────────────────────
function exportForFriend() {
  // Grab current live collection from memory (includes all user edits)
  const liveCollection = JSON.stringify(collection);

  // Read the entire source of this page
  const source = document.documentElement.outerHTML;

  // Replace the DEFAULT_COLLECTION definition with the current live data
  // We target the const declaration precisely so we don't touch anything else
  const exported = source.replace(
    /const DEFAULT_COLLECTION = \[[\s\S]*?\];/,
    'const DEFAULT_COLLECTION = ' + liveCollection + ';'
  );

  // Also clear any stale localStorage key in the exported file so the
  // recipient starts fresh from the baked-in data rather than inheriting
  // any leftover localStorage from their own browser
  const cleaned = exported.replace(
    'loadCollection();',
    'localStorage.removeItem(\'theShelf\');\nloadCollection();'
  );

  // Build a downloadable blob and trigger download
  const blob = new Blob([cleaned], { type: 'text/html;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = 'the-shelf.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
